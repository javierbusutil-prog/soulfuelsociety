<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1400" viewBox="0 0 1200 1400">
  <rect width="100%" height="100%" fill="none"/>
  <text x="600" y="400" fill="#2E4057" font-family="Georgia, serif" font-size="260" letter-spacing="12" font-weight="500" text-anchor="middle">SOUL</text>
  <text x="600" y="1000" fill="#2E4057" font-family="Georgia, serif" font-size="260" letter-spacing="12" font-weight="500" text-anchor="middle">FUEL</text>
  <!-- Flame icon - centered between SOUL and FUEL, solid fill with inner curl -->
  <g transform="translate(520, 500)">
    <!-- Outer flame shape -->
    <path d="M80 0 C30 70, 0 150, 30 230 C50 280, 100 310, 130 280 C160 250, 170 200, 160 150 C150 100, 130 50, 80 0 Z" fill="#2E4057"/>
    <!-- Inner curl/teardrop -->
    <path d="M90 120 C70 150, 70 190, 90 210 C110 230, 130 210, 130 180 C130 150, 110 130, 90 120 Z" fill="#FAFAF8"/>
  </g>
</svg>